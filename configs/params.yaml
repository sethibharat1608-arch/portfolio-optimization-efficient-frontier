# Data window
start_date: "2021-01-01"
end_date: "2026-01-01"

# Risk-free rate (annualized), approx 3-month T-bill rate in 2026
risk_free_rate: 0.045

# Backtest settings
backtest_start: "2025-01-01"   # last ~1 year held out as out-of-sample
rebalance_frequency: "M"        # M = monthly

# Efficient frontier resolution
n_frontier_points: 30

# Benchmark for comparison
benchmark_ticker: "SPY"
